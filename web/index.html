<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>软爪</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="app" aria-label="软爪 visual novel">
      <section id="title-screen" class="title-screen">
        <div class="title-copy">
          <p class="kicker">Cedric Route / Chapter One</p>
          <h1>软爪</h1>
          <p class="subtitle">白日的猫与月夜的少女</p>
          <div class="title-actions">
            <button id="start-game" type="button">开始游戏</button>
            <button id="continue-game" type="button">继续</button>
          </div>
        </div>
      </section>

      <section id="stage" class="stage hidden">
        <img id="background" class="background" alt="" />
        <div id="tone-overlay" class="tone-overlay"></div>
        <div id="cg-stage" class="cg-stage hidden" aria-hidden="true">
          <img id="event-cg" class="event-cg" alt="" />
          <div id="cg-effects" class="cg-effects"></div>
        </div>
        <img id="character" class="character hidden" alt="" />

        <aside id="hud" class="hud">
          <span id="chapter-label">序章</span>
          <span id="stats-label">亲近 0 · 警戒 0 · 观察 0</span>
        </aside>

        <nav class="topbar" aria-label="game controls">
          <button id="history-button" type="button">历史</button>
          <button id="save-button" type="button">存档</button>
          <button id="load-button" type="button">读档</button>
          <button id="settings-button" type="button">设置</button>
        </nav>

        <div id="choice-panel" class="choice-panel hidden"></div>

        <section id="dialogue" class="dialogue" role="button" tabindex="0" aria-label="next dialogue">
          <div class="nameplate" id="speaker">旁白</div>
          <p id="line"></p>
          <span id="next-mark">点击继续</span>
        </section>
      </section>

      <dialog id="modal">
        <form method="dialog">
          <header>
            <strong id="modal-title">设置</strong>
            <button value="close" type="submit" aria-label="close">×</button>
          </header>
          <div id="modal-body"></div>
        </form>
      </dialog>
    </main>
    <script type="module" src="./game.js"></script>
  </body>
</html>
